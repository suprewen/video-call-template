name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HAS_CLOUDFLARE_DEPLOY_CREDENTIALS: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && vars.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: env.HAS_CLOUDFLARE_DEPLOY_CREDENTIALS == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name video-call-template --branch main

      - name: Explain skipped deployment
        if: env.HAS_CLOUDFLARE_DEPLOY_CREDENTIALS != 'true'
        run: |
          echo "Build succeeded, but Cloudflare deployment was skipped."
          echo "Add the CLOUDFLARE_API_TOKEN repository secret to enable automatic deployment."
